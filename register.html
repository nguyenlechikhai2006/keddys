<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký - Keddy</title>
<link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="box">
        <a href="index.html" class="back-btn">← </a>

    <h2>🐾 Đăng ký</h2>

    <form onsubmit="event.preventDefault(); register();">
        <input type="text" id="reg-username" placeholder="Tên" required>
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Mật khẩu" required>
        <button type="submit">Đăng ký</button>
    </form>

    <div class="link">
        <a href="login.html">Đã có tài khoản? Đăng nhập</a>
    </div>
</div>

<script>
async function register() {
    const username = document.getElementById('reg-username').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;

    try {
        const res = await fetch('api/register.php', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

       if (data.success) {
    showNotify("Đăng ký thành công 🎉", "login.html");
} else {
            alert(data.error);
        }

    } catch (e) {
        alert("Lỗi server!");
        console.error(e);
    }
}
function showNotify(message, redirect = null) {
    const box = document.getElementById("notify");
    const text = document.getElementById("notify-text");

    text.textContent = message;
    box.style.display = "flex";

    setTimeout(() => {
        box.style.display = "none";
        if (redirect) window.location.href = redirect;
    }, 2000); // 2 giây
}
</script>
<script>
function showNotify(message, redirectUrl) {
    const box = document.createElement("div");
    box.innerText = message;

    box.style.position = "fixed";
    box.style.top = "50%";
    box.style.left = "50%";
    box.style.transform = "translate(-50%, -50%)";
    box.style.background = "#ff7b00";
    box.style.color = "#fff";
    box.style.padding = "20px 30px";
    box.style.borderRadius = "12px";
    box.style.fontSize = "18px";
    box.style.boxShadow = "0 10px 30px rgba(0,0,0,0.2)";
    box.style.zIndex = "9999";

    document.body.appendChild(box);

    setTimeout(() => {
        box.remove();
        if (redirectUrl) window.location.href = redirectUrl;
    }, 2000);
}
</script>
<div id="notify" class="notify">
    <div class="notify-box">
        <p id="notify-text"></p>
    </div>
</div>
</body>
</html>
