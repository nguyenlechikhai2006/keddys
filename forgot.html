<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quên mật khẩu - Keddy Pet Shop</title>
<link rel="stylesheet" href="css/auth.css">
<style>
  .step { display: none; }
  .step.active { display: block; }

  .otp-box {
    background: #f0f7ff;
    border: 2px dashed #4a90e2;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin: 16px 0;
  }
  .otp-code {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #1a73e8;
  }
  .otp-note {
    font-size: 12px;
    color: #888;
    margin-top: 6px;
  }
  .success-icon {
    font-size: 60px;
    text-align: center;
    margin: 16px 0;
  }
  .msg-error { color: #e84a4a; font-size: 13px; margin-top: 8px; text-align:center; }
  .msg-success { color: #2e7d32; font-size: 13px; margin-top: 8px; text-align:center; }
</style>
</head>
<body>

<div class="box">
  <h2>🔑 Quên mật khẩu</h2>

  <!-- STEP 1: Nhập email -->
  <div class="step active" id="step1">
    <p style="font-size:14px;color:#666;margin-bottom:16px;">Nhập email tài khoản của bạn để nhận mã OTP.</p>
    <input type="email" id="email-input" placeholder="Email của bạn" required>
    <div id="msg1" class="msg-error"></div>
    <button id="btn-send-otp">Gửi mã OTP</button>
    <div class="link"><a href="login.html">← Quay lại đăng nhập</a></div>
  </div>

  <!-- STEP 2: Hiện OTP + nhập mật khẩu mới -->
  <div class="step" id="step2">
    <p style="font-size:14px;color:#666;margin-bottom:8px;">Mã OTP của bạn (có hiệu lực 5 phút):</p>
    <div class="otp-box">
      <div class="otp-code" id="otp-display">------</div>
      <div class="otp-note">📋 Sao chép mã này rồi dán vào ô bên dưới</div>
    </div>

    <input type="text" id="otp-input" placeholder="Nhập mã OTP (6 số)" maxlength="6" style="letter-spacing:4px;text-align:center;font-size:20px;font-weight:700;">
    <input type="password" id="new-password" placeholder="Mật khẩu mới (tối thiểu 6 ký tự)">
    <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu mới">
    <div id="msg2" class="msg-error"></div>
    <button id="btn-reset">Đổi mật khẩu</button>
    <div class="link"><a href="#" id="btn-back-step1">← Nhập lại email</a></div>
  </div>

  <!-- STEP 3: Thành công -->
  <div class="step" id="step3">
    <div class="success-icon">🎉</div>
    <p style="text-align:center;font-weight:700;font-size:18px;">Đổi mật khẩu thành công!</p>
    <p style="text-align:center;font-size:14px;color:#666;margin-top:8px;">Bạn có thể đăng nhập bằng mật khẩu mới.</p>
    <a href="login.html"><button style="margin-top:16px;">Đăng nhập ngay</button></a>
  </div>
</div>

<script>
let generatedOTP = '';
let verifiedEmail = '';

function showStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
}

function setMsg(id, msg, isError = true) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = isError ? 'msg-error' : 'msg-success';
}

// STEP 1 — Gửi OTP
document.getElementById('btn-send-otp').addEventListener('click', async () => {
  const email = document.getElementById('email-input').value.trim();
  if (!email) { setMsg('msg1', 'Vui lòng nhập email!'); return; }

  const btn = document.getElementById('btn-send-otp');
  btn.disabled = true;
  btn.textContent = 'Đang kiểm tra...';

  try {
    const res = await fetch('api/forgot_password.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'send_otp', email })
    });
    const data = await res.json();

    if (data.success) {
      verifiedEmail = email;
      generatedOTP  = data.otp; // nhận OTP từ server
      document.getElementById('otp-display').textContent = data.otp;
      showStep(2);
    } else {
      setMsg('msg1', data.message || 'Email không tồn tại trong hệ thống!');
    }
  } catch (err) {
    setMsg('msg1', 'Lỗi kết nối server!');
  }

  btn.disabled = false;
  btn.textContent = 'Gửi mã OTP';
});

// Back về step 1
document.getElementById('btn-back-step1').addEventListener('click', e => {
  e.preventDefault();
  showStep(1);
});

// STEP 2 — Xác nhận OTP + đổi mật khẩu
document.getElementById('btn-reset').addEventListener('click', async () => {
  const otp      = document.getElementById('otp-input').value.trim();
  const newPass  = document.getElementById('new-password').value;
  const confPass = document.getElementById('confirm-password').value;

  if (otp !== generatedOTP) { setMsg('msg2', 'Mã OTP không đúng!'); return; }
  if (newPass.length < 6)   { setMsg('msg2', 'Mật khẩu phải có ít nhất 6 ký tự!'); return; }
  if (newPass !== confPass)  { setMsg('msg2', 'Mật khẩu xác nhận không khớp!'); return; }

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = 'Đang cập nhật...';

  try {
    const res = await fetch('api/forgot_password.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'reset_password', email: verifiedEmail, new_password: newPass })
    });
    const data = await res.json();

    if (data.success) {
      showStep(3);
    } else {
      setMsg('msg2', data.message || 'Đổi mật khẩu thất bại!');
    }
  } catch (err) {
    setMsg('msg2', 'Lỗi kết nối server!');
  }

  btn.disabled = false;
  btn.textContent = 'Đổi mật khẩu';
});
</script>
</body>
</html>
